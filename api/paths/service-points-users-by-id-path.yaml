get:
  summary: Get service points user by id
  operationId: getServicePointsUserById
  tags: [ service-points-users ]
  parameters:
    - $ref: '../parameters/id-param.yaml'
  responses:
    '200':
      description: Service points user record.
      content:
        application/json:
          schema:
            $ref: '../schemas/servicePointsUser.yaml'
put:
  summary: Update service points user by id
  operationId: updateServicePointsUserById
  tags: [ service-points-users ]
  parameters:
    - $ref: '../parameters/id-param.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/servicePointsUser.yaml'
  responses:
    '204':
      description: Updated.
delete:
  summary: Delete service points user by id
  operationId: deleteServicePointsUserById
  tags: [ service-points-users ]
  parameters:
    - $ref: '../parameters/id-param.yaml'
  responses:
    '204':
      description: Deleted.
