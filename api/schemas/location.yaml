title: "Location"
description: "Location: the forth-level location unit below institution, campus, and library"
type: object
properties:
  id:
    description: "ID of the location"
    type: string
    format: uuid
  name:
    description: "Name of the location"
    type: string
  code:
    description: "Code of the location, usually an abbreviation of the name"
    type: string
  description:
    description: "Description of the location"
    type: string
  discoveryDisplayName:
    description: "Name of the location to be shown in the discovery"
    type: string
  isActive:
    description: "Whether this location is active. Inactive locations can no longer been used"
    type: boolean
  institutionId:
    description: "The ID of the institution, the first-level location unit, this location belongs to"
    type: string
    format: uuid
  campusId:
    description: "The ID of the campus, the second-level location unit, this location belongs to"
    type: string
    format: uuid
  libraryId:
    description: "The ID of the library, the third-level location unit, this location belongs to"
    type: string
    format: uuid
  details:
    description: "Details about this location"
    type: object
    additionalProperties: true
  primaryServicePoint:
    description: "The ID of the primary service point of this location"
    type: string
    format: uuid
  servicePointIds:
    description: "All service points that this location has"
    type: array
    items:
      description: "The ID of a service point that belongs to this location"
      type: string
      format: uuid
  isFloatingCollection:
    description: "Items checked in/out from this location can be checked in/out to other locations with the same flag"
    type: boolean
  isShadow:
    description: "Whether this location is a shadow location. Shadow locations are used to represent virtual locations that no items are assignable to them. They only relate to external libraries and virtual items."
    type: boolean
    default: false
  metadata:
    $ref: 'common/metadata.yaml'
additionalProperties: false
required:
  - name
  - code
  - institutionId
  - campusId
  - libraryId
  - primaryServicePoint
