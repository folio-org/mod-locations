description: "Library: third-level location unit"
type: object
properties:
  id:
    description: "ID of the library"
    type: string
    format: uuid
  name:
    description: "Name of the library"
    type: string
  code:
    description: "Distinct code for the library"
    type: string
  campusId:
    description: "ID of the campus that the library belongs to"
    type: string
    format: uuid
  isShadow:
    description: "Whether this is a shadow location. Shadow locations are used to represent virtual locations that no items are assignable to them. They only relate to external libraries and virtual items."
    type: boolean
    default: false
  metadata:
    $ref: 'common/metadata.yaml'
additionalProperties: false
required:
  - name
  - campusId
  - code
