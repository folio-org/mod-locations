repos:
  - repo: local
    hooks:
      - id: lint-api
        name: API lint (Spectral)
        language: script
        entry: scripts/lint-api.sh
        pass_filenames: false
        stages: [pre-push]

      - id: checkstyle
        name: Checkstyle
        language: system
        entry: mvn checkstyle:check -q
        pass_filenames: false
        stages: [pre-push]

  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint
        stages: [commit-msg]
